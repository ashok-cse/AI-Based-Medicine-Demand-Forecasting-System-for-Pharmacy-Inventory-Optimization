# Local testing stack: Flask app + MongoDB.
# Usage: docker compose up --build  then open http://localhost:5000
services:
  app:
    build: .
    ports:
      # Host 8080 -> container 5000. macOS uses port 5000 for AirPlay/Control
      # Center, which would otherwise intercept the app with an HTTP 403.
      - "8080:5000"
    environment:
      MONGO_URI: "mongodb://mongo:27017/medicine_forecasting"
      MONGO_DB_NAME: "medicine_forecasting"
      FLASK_ENV: "production"
      SECRET_KEY: "change-this-secret"
      PORT: "5000"
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
