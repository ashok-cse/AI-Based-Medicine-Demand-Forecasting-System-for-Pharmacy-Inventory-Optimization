{% extends "base.html" %}
{% block title %}Alerts · PharmaForecast{% endblock %}
{% block heading %}Inventory Alerts{% endblock %}
{% block content %}
<div class="d-flex gap-2 mb-3 flex-wrap" id="alert-filters">
  <button class="btn btn-sm btn-dark active" data-filter="all">All</button>
  <button class="btn btn-sm btn-outline-danger" data-filter="critical">Critical</button>
  <button class="btn btn-sm btn-outline-warning" data-filter="high">High</button>
  <button class="btn btn-sm btn-outline-info" data-filter="medium">Medium</button>
  <button class="btn btn-sm btn-outline-secondary" data-filter="low">Low</button>
</div>
<div class="card border-0 shadow-sm"><div class="card-body">
  <div class="table-responsive"><table class="table table-sm table-hover align-middle">
    <thead class="table-light"><tr>
      <th>Severity</th><th>Type</th><th>Medicine</th><th>Message</th><th>Created</th>
    </tr></thead>
    <tbody id="alerts-body"><tr><td colspan="5" class="text-muted">Loading…</td></tr></tbody>
  </table></div>
</div></div>
{% endblock %}
{% block scripts %}<script>document.addEventListener('DOMContentLoaded', initAlerts);</script>{% endblock %}
