<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Medicine Demand Forecasting{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Plotly.js -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <nav class="sidebar text-white p-3">
    <div class="brand mb-4">
      <i class="bi bi-capsule-pill"></i>
      <span>PharmaForecast</span>
    </div>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link {% if active=='dashboard' %}active{% endif %}" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link {% if active=='medicines' %}active{% endif %}" href="/medicines"><i class="bi bi-capsule"></i> Medicines</a></li>
      <li class="nav-item"><a class="nav-link {% if active=='forecasts' %}active{% endif %}" href="/forecasts"><i class="bi bi-graph-up-arrow"></i> Forecasts</a></li>
      <li class="nav-item"><a class="nav-link {% if active=='alerts' %}active{% endif %}" href="/alerts"><i class="bi bi-bell"></i> Alerts</a></li>
      <li class="nav-item"><a class="nav-link {% if active=='model-comparison' %}active{% endif %}" href="/model-comparison"><i class="bi bi-bar-chart-line"></i> Model Comparison</a></li>
      <li class="nav-item"><a class="nav-link {% if active=='upload' %}active{% endif %}" href="/upload"><i class="bi bi-upload"></i> Upload Data</a></li>
    </ul>
    <div class="sidebar-footer small text-white-50 mt-4">
      University prototype.<br>Synthetic data only.<br><strong>Not medical advice.</strong>
    </div>
  </nav>

  <!-- Main content -->
  <main class="content flex-grow-1">
    <div class="topbar d-flex justify-content-between align-items-center px-4 py-2">
      <h5 class="mb-0">{% block heading %}Dashboard{% endblock %}</h5>
      <div class="d-flex align-items-center gap-2">
        <span id="mongo-status" class="badge bg-secondary">checking…</span>
        <div class="btn-group btn-group-sm" role="group">
          <button class="btn btn-outline-primary" onclick="runAction('/api/seed','Seeding synthetic data…')"><i class="bi bi-database-add"></i> Seed</button>
          <button class="btn btn-outline-success" onclick="runAction('/api/train','Training models (may take a moment)…')"><i class="bi bi-cpu"></i> Train</button>
          <button class="btn btn-outline-info" onclick="runAction('/api/generate-forecasts','Generating forecasts…')"><i class="bi bi-magic"></i> Forecast</button>
        </div>
      </div>
    </div>

    <div id="toast-area" class="toast-area"></div>

    <div class="px-4 py-3">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
